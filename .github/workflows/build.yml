name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Generate contributors
        run: node scripts/fetch-contributors.mjs

      - name: Build Tauri (Windows)
        shell: bash
        run: |
          # retry up to 3 times for network flakes
          for i in 1 2 3; do
            echo "=== Build attempt $i/3 ==="
            pnpm tauri build --target x86_64-pc-windows-msvc && exit 0
            echo "Build attempt $i failed, retrying..."
            cargo clean 2>/dev/null || true
            sleep 5
          done
          echo "All build attempts failed"
          exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: floral-notepaper-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
